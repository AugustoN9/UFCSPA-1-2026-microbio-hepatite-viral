<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz: O Malware do Fígado</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="quiz-container">
      <div id="quiz-content">
        <img src="images/logo.png" alt="Logo Quiz Microbio" class="logo" />
        <h1>Hepatites: O Malware do Fígado</h1>
        <div id="question" class="question"></div>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback-text"></div>
        <button id="next-btn">PRÓXIMA PERGUNTA</button>
      </div>
      <div id="score-container" style="display: none">
        <img src="images/logo.png" alt="Logo Quiz Microbio" class="logo" />

        <h1>Resultado Final</h1>
        <div
          id="stars-container"
          style="font-size: 2rem; margin-bottom: 1rem"
        ></div>

        <p id="score-text" style="font-size: 1.1rem; line-height: 1.6"></p>
        <button
          onclick="location.reload()"
          style="
            text-align: center;
            background-color: #238636;
            color: white;
            border: none;
            font-weight: bold;
          "
        >
          REINICIAR SISTEMA
        </button>
      </div>

      <footer class="footer">
        Desenvolvido por <span>@AugustoN9</span> • v1.0
      </footer>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
